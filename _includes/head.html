<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.summary | default: site.description | strip_html }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/nav-overrides.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/typography-events.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/upcoming-events.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/homepage-spacing.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/education-blog.css' | relative_url }}">
  {% if page.math %}
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  {% endif %}
  {% seo %}
</head>

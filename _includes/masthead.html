<header class="masthead">
  <div class="wrap masthead__inner">
    <a class="site-title" href="{{ '/' | relative_url }}" aria-label="Time Series Connect home">
      <span class="site-title__name">{{ site.title }}</span>
      <span class="site-title__tagline">Interdisciplinary Seminar Series</span>
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      {% for item in site.data.navigation.main %}
        <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}class="active"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
